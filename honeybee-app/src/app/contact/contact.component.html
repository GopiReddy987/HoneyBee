<div class="contact-container">
  <div class="contact-content">
    <div class="contact-info">
      <h1>Contact Us</h1>
      <p>We'd love to hear from you! Send us a message and we'll respond as soon as possible.</p>
      
      <div class="info-item">
        <i class="fas fa-map-marker-alt"></i>
        <div>
          <h3>Address</h3>
          <p>123 Business Street<br>New York, NY 10001</p>
        </div>
      </div>

      <div class="info-item">
        <i class="fas fa-phone"></i>
        <div>
          <h3>Phone</h3>
          <p>+1 (555) 123-4567</p>
        </div>
      </div>

      <div class="info-item">
        <i class="fas fa-envelope"></i>
        <div>
          <h3>Email</h3>
          <p>info&#64;honeybee.com</p>
        </div>
      </div>
    </div>

    <form class="contact-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" [(ngModel)]="contactForm.name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="contactForm.email" name="email" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" [(ngModel)]="contactForm.message" name="message" rows="5" required></textarea>
      </div>

      <button type="submit" class="submit-button">Send Message</button>
    </form>
  </div>
</div>
